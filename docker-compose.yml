# Запуск Postgres + Mongo + account + payment + cashback из корня репозитория:
#   docker compose up --build -d

services:
  mongo:
    image: mongo:7
    container_name: paymentsystem-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - paymentsystem-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: paymentsystem-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME_ACCOUNT:-account}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - paymentsystem-postgres-data:/var/lib/postgresql/data
      - ./services/account/docker/init-create-payment-db.sql:/docker-entrypoint-initdb.d/02-create-payment.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  account:
    build:
      context: .
      dockerfile: services/account/Dockerfile
    container_name: account-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME_ACCOUNT:-account}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "false"
    ports:
      - "${ACCOUNT_PORT:-8090}:8090"

  payment:
    build:
      context: .
      dockerfile: services/payment/Dockerfile
    container_name: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      account:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME_PAYMENT:-payment}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "false"
      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL:-http://account:8090}
      CASHBACK_SERVICE_URL: ${CASHBACK_SERVICE_URL:-http://cashback:8092}
      CASHBACK_ENABLED: ${CASHBACK_ENABLED:-true}
    ports:
      - "${PAYMENT_PORT:-8091}:8091"

  cashback:
    build:
      context: .
      dockerfile: services/cashback/Dockerfile
    container_name: cashback-service
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # Spring Boot 4 binds SPRING_MONGODB_URI → spring.mongodb.uri (not spring.data.mongodb.*)
      SPRING_MONGODB_URI: ${SPRING_MONGODB_URI:-mongodb://mongo:27017/cashback}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "false"
      CASHBACK_RATES_INDIVIDUAL_DEFAULT_PERCENT: ${CASHBACK_RATES_INDIVIDUAL_DEFAULT_PERCENT:-1.0}
      CASHBACK_RATES_LEGAL_ENTITY_DEFAULT_PERCENT: ${CASHBACK_RATES_LEGAL_ENTITY_DEFAULT_PERCENT:-0.5}
    ports:
      - "${CASHBACK_PORT:-8092}:8092"

volumes:
  paymentsystem-postgres-data:
  paymentsystem-mongo-data:
