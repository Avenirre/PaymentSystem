services:
  postgres:
    image: postgres:16-alpine
    container_name: account-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-account}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - account-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  account:
    build:
      context: ../..
      dockerfile: services/account/Dockerfile
    container_name: account-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Явный URL — Spring Boot надёжно подхватывает; хост postgres = имя сервиса в сети compose (не localhost)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-account}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "false"
    ports:
      - "${APP_PORT:-8090}:8090"

volumes:
  account-postgres-data:
