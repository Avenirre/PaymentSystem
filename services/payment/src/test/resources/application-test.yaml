spring:
  datasource:
    url: jdbc:h2:mem:paymenttest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # Схема из сущностей: Liquibase+uuid на H2 часто ломает validate; в проде по-прежнему Liquibase из main application.yaml
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  devtools:
    restart:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      transaction-id-prefix: test-payment-cashback-
      enable-idempotence: true
      retries: 3
      properties:
        "[retry.backoff.ms]": 300
        "[delivery.timeout.ms]": 60000
  task:
    scheduling:
      enabled: false

cashback:
  enabled: false
  kafka:
    legal-entity-topic: cashback.transfer.events.test
    individual-topic: cashback.individual.transfer.events.test
  outbox:
    publish-interval-ms: 60000
    batch-size: 10

account:
  base-url: http://localhost:8090

notification:
  kafka-topic: business.notification.events.test
  outbox:
    publish-interval-ms: 60000
    batch-size: 10
