spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      transaction-id-prefix: ${SPRING_KAFKA_PRODUCER_TRANSACTION_ID_PREFIX:${spring.application.name}-cashback-}
      enable-idempotence: true
      retries: 3
      properties:
        spring.json.add.type.headers: false
        max.in.flight.requests.per.connection: 5
        "[retry.backoff.ms]": 300
        "[delivery.timeout.ms]": 60000

server:
  port: 8091

account:
  base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8090}

notification:
  kafka-topic: ${NOTIFICATION_KAFKA_TOPIC:business.notification.events}

cashback:
  enabled: ${CASHBACK_ENABLED:true}
  kafka:
    legal-entity-topic: ${CASHBACK_KAFKA_LEGAL_ENTITY_TOPIC:cashback.transfer.events}
    individual-topic: ${CASHBACK_KAFKA_INDIVIDUAL_TOPIC:cashback.individual.transfer.events}
  outbox:
    publish-interval-ms: ${CASHBACK_OUTBOX_PUBLISH_INTERVAL_MS:500}
    batch-size: ${CASHBACK_OUTBOX_BATCH_SIZE:50}
