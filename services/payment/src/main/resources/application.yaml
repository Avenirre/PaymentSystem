spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8091

account:
  base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8090}

cashback:
  enabled: ${CASHBACK_ENABLED:true}
  base-url: ${CASHBACK_SERVICE_URL:http://localhost:8092}
  notify-path: ${CASHBACK_NOTIFY_PATH:/api/v1/cashback/transfers}
