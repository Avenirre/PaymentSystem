databaseChangeLog:
  - changeSet:
      id: 001-cashback-outbox
      author: payment-service
      changes:
        - createTable:
            tableName: cashback_outbox
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: varchar(256)
                  constraints:
                    nullable: false
              - column:
                  name: partition_key
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: payload_json
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: attempt_count
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: varchar(2048)
                  constraints:
                    nullable: true
        - addUniqueConstraint:
            tableName: cashback_outbox
            columnNames: aggregate_id, event_type
            constraintName: uk_cashback_outbox_aggregate_event
        - createIndex:
            tableName: cashback_outbox
            indexName: idx_cashback_outbox_status_created
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
