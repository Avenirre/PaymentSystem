spring:
  application:
    name: cashback-service
  mongodb:
    uri: ${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE:cashback}}}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${CASHBACK_KAFKA_CONSUMER_GROUP:cashback-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8092

cashback:
  rates:
    individual-default-percent: ${CASHBACK_RATES_INDIVIDUAL_DEFAULT_PERCENT:1.0}
    legal-entity-default-percent: ${CASHBACK_RATES_LEGAL_ENTITY_DEFAULT_PERCENT:0.5}
  kafka:
    legal-entity-topic: ${CASHBACK_KAFKA_LEGAL_ENTITY_TOPIC:cashback.transfer.events}
    individual-topic: ${CASHBACK_KAFKA_INDIVIDUAL_TOPIC:cashback.individual.transfer.events}
